apiVersion: apps/v1
kind: Deployment
metadata:
  name: kadm
  namespace: kadm
  labels:
    app.kubernetes.io/name: kadm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kadm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kadm
    spec:
      serviceAccountName: kadm
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: kadm
          image: ghcr.io/ccq18/kadm-platform-system:sha-initial
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: KADM_APPS_CONFIG
              value: /etc/kadm/apps.json
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kadm-secrets
                  key: GITHUB_TOKEN
            - name: ARGOCD_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: kadm-secrets
                  key: ARGOCD_BASE_URL
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kadm-secrets
                  key: ARGOCD_TOKEN
            - name: KADM_ARGOCD_INSECURE_TLS
              value: "true"
            - name: KADM_CLUSTER_NAME
              valueFrom:
                secretKeyRef:
                  name: kadm-secrets
                  key: KADM_CLUSTER_NAME
                  optional: true
            - name: K3S_JOIN_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: kadm-secrets
                  key: K3S_JOIN_SERVER_URL
                  optional: true
            - name: K3S_JOIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kadm-secrets
                  key: K3S_JOIN_TOKEN
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/kadm
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: kadm-apps-config
