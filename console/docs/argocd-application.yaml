apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kadm-platform-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ccq18/kadm-platform-system.git
    targetRevision: main
    path: console/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: kadm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
