name: Build Platform System Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to sha-<short commit>.
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - console/**
      - .github/workflows/build-platform-system-image.yaml

permissions:
  contents: write
  packages: write

concurrency:
  group: build-platform-system-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/ccq18/kadm-platform-system:${tag}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: console
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}

      - name: Install Kustomize
        env:
          KUSTOMIZE_VERSION: v5.4.2
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL --retry 3 --retry-delay 2 \
            -o "${tmp}/kustomize.tar.gz" \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf "${tmp}/kustomize.tar.gz" -C "${tmp}" kustomize
          sudo install -m 0755 "${tmp}/kustomize" /usr/local/bin/kustomize
          kustomize version

      - name: Update prod image tag
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ghcr.io/ccq18/kadm-platform-system=ghcr.io/ccq18/kadm-platform-system:${{ steps.meta.outputs.tag }}

      - name: Commit manifest update
        working-directory: .
        run: |
          if git diff --quiet; then
            echo "No manifest changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add console/k8s/overlays/prod/kustomization.yaml
          git commit -m "chore: release kadm-platform-system ${{ steps.meta.outputs.tag }}"
          git push
