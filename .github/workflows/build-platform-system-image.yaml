name: Build Platform System Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to UTC YYYYMMDDHHMMSS.
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - console/**
      - '!console/k8s/**'
      - .github/workflows/build-platform-system-image.yaml

permissions:
  contents: read
  packages: write

concurrency:
  group: build-platform-system-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="$(date -u +%Y%m%d%H%M%S)"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/ccq18/kadm-platform-system:${tag}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: console
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}

      - name: Print image
        run: echo "${{ steps.meta.outputs.image }}"
